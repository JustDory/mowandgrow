# Site settings
title: Mow and Grow
description: Professional lawn care and landscaping services
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.mow-and-grow.ca" # the base hostname & protocol for your site
twitter_username: your_twitter_username
github_username: JustDory

# Theme settings
remote_theme: eliottvincent/bay

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title:output_ext

# Header configuration
header:
  pages:
    - name: Home
      slug: /
    - name: Services
      slug: /services
    - name: Gallery  
      slug: /gallery
    - name: Contact
      slug: /contact

# Footer configuration
footer:
  show_powered_by: true
  contact:
    - type: email
      name: Email
      value: info@mow-and-grow.ca
    - type: phone
      name: Phone
      value: "+1-782-234-1027"
      link: "tel:+17822341027"
  follow:
    - type: facebook
      name: Facebook
      link: "https://facebook.com/mowandgrowca"
    - type: instagram
      name: Instagram
      link: "https://instagram.com/mowandgrowca"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
